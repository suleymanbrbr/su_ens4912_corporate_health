services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sut_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: sut_knowledge_base
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sut_backend
    environment:
      - HF_HOME=/app/data/hf_cache
      - SENTENCE_TRANSFORMERS_HOME=/app/data/hf_cache
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api_server.py:/app/api_server.py
      - ./backend/kg_storage.py:/app/kg_storage.py
      - ./backend/sut_rag_core.py:/app/sut_rag_core.py
      - ./backend/kg_builder.py:/app/kg_builder.py
      - ./data:/app/data
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sut_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
